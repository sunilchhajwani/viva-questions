<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sjögren's Syndrome - Z-AI Ultimate Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style>
        body { font-family: "Poppins", sans-serif; background: #0f172a; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .title-font { font-family: "Montserrat", sans-serif; }
        
        /* --- LAYOUT PANELS --- */
        .sidebar { width: 220px; background: #1e293b; border-right: 1px solid #334155; padding: 20px; overflow-y: auto; }
        .properties-panel { width: 280px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; color: white; display: none; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e3a5f 0%, #0f172a 100%); position: relative; }

        /* --- THE SLIDE --- */
        .ppt-slide {
            width: 1100px; height: 618px; /* 16:9 */
            background: #f8fafc; position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); display: none;
        }
        .ppt-slide.active { display: block; }

        /* --- THUMBNAILS --- */
        .slide-thumb {
            width: 100%; height: 100px; background: #334155; border-radius: 8px; margin-bottom: 15px;
            cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center;
            color: #94a3b8; font-size: 12px; transition: 0.2s; position: relative; overflow: hidden;
            text-align: center; padding: 5px;
        }
        .slide-thumb.active { border-color: #3b82f6; background: #475569; }
        .slide-thumb:hover { background: #475569; }

        /* --- ELEMENTS --- */
        .element { position: absolute !important; cursor: grab; padding: 10px; z-index: 10; user-select: none; }
        .element:hover { outline: 2px dashed #3b82f6; }
        .element.selected { outline: 2px solid #3b82f6; z-index: 100; }
        .element [contenteditable="true"] { user-select: text; cursor: text; outline: none; }

        /* --- UI UTILS --- */
        .toolbar { height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 30px; gap: 15px; }
        .btn { background: #334155; color: white; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn:hover { background: #475569; }
        .btn-blue { background: #3b82f6 !important; }
        .btn-red { background: #ef4444 !important; }
        .btn-green { background: #10b981 !important; margin-left: auto; font-weight: bold; }
        
        input[type="color"] { background: none; border: none; width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- TOP TOOLBAR -->
    <div class="toolbar">
        <button class="btn btn-blue" onclick="addSlide()"><i class="material-icons text-sm">add</i> New Slide</button>
        <div class="w-px h-6 bg-slate-700"></div>
        <button class="btn" onclick="addText()"><i class="material-icons text-sm">title</i> Text</button>
        <button class="btn" onclick="addCard()"><i class="material-icons text-sm">dashboard</i> Card</button>
        <button class="btn" onclick="document.getElementById('imgInp').click()"><i class="material-icons text-sm">image</i> Image</button>
        <input type="file" id="imgInp" hidden onchange="uploadImg(this)">
        
        <button class="btn btn-green" onclick="exportDeck()"><i class="material-icons text-sm">download</i> Export Presentation</button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- LEFT SIDEBAR: SLIDE MANAGER -->
        <div class="sidebar" id="sidebar">
            <div class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">Slides</div>
            <div id="thumb-container">
                <!-- Thumbs injected here -->
            </div>
        </div>

        <!-- CENTER CANVAS: THE EDITOR -->
        <div class="canvas-area">
            <div id="slide-container">
                <!-- Slides injected here -->
            </div>
        </div>

        <!-- RIGHT PANEL: PROPERTIES -->
        <div class="properties-panel" id="prop-panel">
            <div class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">Element Properties</div>
            
            <div class="mb-6">
                <label class="text-xs text-slate-500 block mb-2">Text Color</label>
                <input type="color" id="prop-color" onchange="updateProp('color', this.value)">
            </div>
            <div class="mb-6">
                <label class="text-xs text-slate-500 block mb-2">Font Size (px)</label>
                <input type="number" id="prop-size" class="w-full bg-slate-800 text-white p-2 rounded border border-slate-700" onchange="updateProp('fontSize', this.value + 'px')">
            </div>
            <div class="mb-6">
                <label class="text-xs text-slate-500 block mb-2">Width (px)</label>
                <input type="number" id="prop-width" class="w-full bg-slate-800 text-white p-2 rounded border border-slate-700" onchange="updateProp('width', this.value + 'px')">
            </div>

            <button class="btn btn-red w-full justify-center mt-10" onclick="deleteElement()"><i class="material-icons text-sm">delete</i> Delete Element</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        let slideCount = 0;
        let selectedEl = null;
        let dragEl = null;
        let shiftX, shiftY;

        const initialSlides = [
            {
                title: "Sjögren's Syndrome",
                subtitle: "Systemic Autoimmune Exocrinopathy: Clinical Masterclass",
                elements: [
                    { type: 'header', content: "Sjögren's Syndrome", sub: "Masterclass Presentation", top: 15, left: 60 },
                    { type: 'card', title: "Core Definition", text: "A chronic, systemic autoimmune disorder primarily involving lymphocytic infiltration of exocrine glands, leading to dry eyes (xerophthalmia) and dry mouth (xerostomia).", top: 180, left: 60, width: 500 },
                    { type: 'card', title: "The 'Central Triplet'", text: "1. Sicca Symptoms (Eyes/Mouth)<br>2. Profound Fatigue<br>3. Chronic Widespread Pain", top: 180, left: 580, width: 450 }
                ]
            },
            {
                title: "Clinical Presentation",
                subtitle: "Glandular vs. Extraglandular Manifestations",
                elements: [
                    { type: 'header', content: "Clinical Spectrum", sub: "Glandular and Systemic Involvement", top: 15, left: 60 },
                    { type: 'card', title: "Glandular (Sicca)", text: "• Xerostomia (Dental Caries, 'Cotton Mouth')<br>• Xerophthalmia (Foreign body sensation)<br>• Parotid Gland Enlargement (Bilateral)", top: 160, left: 60, width: 450 },
                    { type: 'card', title: "Extraglandular (50% of cases)", text: "• Pulmonary: ILD, Bronchiolitis<br>• Renal: Tubulointerstitial Nephritis (RTA)<br>• Heme: Lymphoma Risk (48x higher - MALT)<br>• Neuro: Peripheral Neuropathy", top: 160, left: 530, width: 500 }
                ]
            },
            {
                title: "Diagnosis & Serology",
                subtitle: "The ACR-EULAR Classification Criteria",
                elements: [
                    { type: 'header', content: "Diagnostic Framework", sub: "Serology and Functional Tests", top: 15, left: 60 },
                    { type: 'card', title: "Key Serology", text: "• Anti-Ro (SSA): ~70% sensitivity<br>• Anti-La (SSB): ~40% sensitivity<br>• ANA/RF: Frequently positive", top: 160, left: 60, width: 450 },
                    { type: 'card', title: "Objective Tests", text: "• Schirmer’s Test (<5mm/5min)<br>• Unstimulated Salivary Flow (≤0.1 mL/min)<br>• Focus Score ≥1 (Labial Biopsy)", top: 160, left: 530, width: 500 }
                ]
            },
            {
                title: "Management Strategy",
                subtitle: "EULAR 2024 Guidelines: A Stepwise Approach",
                elements: [
                    { type: 'header', content: "Therapeutic Management", sub: "Evidence-Based Stepwise Care", top: 15, left: 60 },
                    { type: 'card', title: "Sicca Management", text: "• Eyes: Artificial tears, Cyclosporine drops<br>• Mouth: Pilocarpine/Cevimeline, Hydration", top: 160, left: 60, width: 450 },
                    { type: 'card', title: "Systemic Therapy", text: "• Mild: Hydroxychloroquine (HCQ)<br>• Mod-Severe: Steroids, MTX, Azathioprine<br>• Refractory: Rituximab (Anti-CD20)", top: 160, left: 530, width: 500 }
                ]
            }
        ];

        function init() {
            initialSlides.forEach(s => addSlideWithData(s));
            showSlide(0);
        }

        function addSlideWithData(data) {
            const id = slideCount++;
            const thumb = document.createElement('div');
            thumb.className = 'slide-thumb';
            thumb.id = `thumb-${id}`;
            thumb.onclick = () => showSlide(id);
            thumb.innerText = data.title;
            document.getElementById('thumb-container').appendChild(thumb);

            const slide = document.createElement('div');
            slide.className = 'ppt-slide';
            slide.id = `slide-${id}`;
            slide.innerHTML = `
                <div class="h-24 flex items-center px-16 w-full" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%)">
                    <!-- Title Placeholder -->
                </div>
            `;
            document.getElementById('slide-container').appendChild(slide);

            data.elements.forEach(el => {
                if(el.type === 'header') {
                    const d = document.createElement('div');
                    d.className = 'element';
                    d.style.top = el.top + 'px'; d.style.left = el.left + 'px';
                    d.innerHTML = `<h1 class="title-font text-4xl font-bold text-white" contenteditable="true">${el.content}</h1><p class="text-sm text-teal-200 mt-1" contenteditable="true">${el.sub}</p>`;
                    slide.appendChild(d);
                } else if(el.type === 'card') {
                    const d = document.createElement('div');
                    d.className = 'element bg-white p-8 rounded-2xl shadow-xl border border-slate-200';
                    d.style.top = el.top + 'px'; d.style.left = el.left + 'px'; d.style.width = (el.width || 400) + 'px';
                    d.innerHTML = `<h3 class="font-bold text-blue-800 text-xl mb-4" contenteditable="true">${el.title}</h3><p class="text-slate-600 leading-relaxed" contenteditable="true">${el.text}</p>`;
                    slide.appendChild(d);
                }
            });
        }

        function addSlide() {
            const id = slideCount++;
            const thumb = document.createElement('div');
            thumb.className = 'slide-thumb';
            thumb.id = `thumb-${id}`;
            thumb.onclick = () => showSlide(id);
            thumb.innerText = `Slide ${id + 1}`;
            document.getElementById('thumb-container').appendChild(thumb);

            const slide = document.createElement('div');
            slide.className = 'ppt-slide';
            slide.id = `slide-${id}`;
            slide.innerHTML = `<div class="h-24 flex items-center px-16 w-full" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%)"></div>`;
            document.getElementById('slide-container').appendChild(slide);
            showSlide(id);
        }

        function showSlide(id) {
            currentSlide = id;
            document.querySelectorAll('.ppt-slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.slide-thumb').forEach(t => t.classList.remove('active'));
            document.getElementById(`slide-${id}`).classList.add('active');
            document.getElementById(`thumb-${id}`).classList.add('active');
            deselectAll();
        }

        function addText() {
            const d = document.createElement('div');
            d.className = 'element text-slate-800 text-2xl font-bold';
            d.style.top = '100px'; d.style.left = '100px';
            d.innerHTML = `<div contenteditable="true">Add Headline</div>`;
            document.querySelector('.ppt-slide.active').appendChild(d);
            selectElement(d);
        }

        function addCard() {
            const d = document.createElement('div');
            d.className = 'element bg-white p-6 rounded-xl shadow-lg border-l-4 border-blue-500 w-80';
            d.style.top = '200px'; d.style.left = '200px';
            d.innerHTML = `<h4 class="font-bold text-blue-900" contenteditable="true">Key Point</h4><p class="text-xs text-slate-500 mt-2" contenteditable="true">Details here...</p>`;
            document.querySelector('.ppt-slide.active').appendChild(d);
            selectElement(d);
        }

        function uploadImg(inp) {
            if (inp.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const d = document.createElement('div');
                    d.className = 'element';
                    d.style.top = '150px'; d.style.left = '150px'; d.style.width = '300px';
                    d.innerHTML = `<img src="${e.target.result}" class="rounded-xl shadow-lg w-full">`;
                    document.querySelector('.ppt-slide.active').appendChild(d);
                    selectElement(d);
                };
                r.readAsDataURL(inp.files[0]);
            }
        }

        function selectElement(el) {
            deselectAll();
            selectedEl = el;
            el.classList.add('selected');
            document.getElementById('prop-panel').style.display = 'block';
            document.getElementById('prop-color').value = rgbToHex(window.getComputedStyle(el).color);
            document.getElementById('prop-size').value = parseInt(window.getComputedStyle(el).fontSize);
            document.getElementById('prop-width').value = parseInt(window.getComputedStyle(el).width);
        }

        function deselectAll() {
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
            selectedEl = null;
            document.getElementById('prop-panel').style.display = 'none';
        }

        function updateProp(prop, val) {
            if (selectedEl) {
                if(prop === 'color') {
                   const inner = selectedEl.querySelector('[contenteditable]');
                   if(inner) inner.style.color = val;
                   else selectedEl.style.color = val;
                } else {
                   selectedEl.style[prop] = val;
                }
            }
        }

        function deleteElement() {
            if (selectedEl) {
                selectedEl.remove();
                deselectAll();
            }
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb.startsWith('#')) return rgb;
            const match = rgb.match(/\d+/g);
            if (!match) return '#000000';
            return "#" + match.slice(0, 3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        // --- DRAG ENGINE ---
        document.addEventListener('mousedown', e => {
            const el = e.target.closest('.element');
            if (!el) { if (!e.target.closest('.toolbar') && !e.target.closest('.properties-panel')) deselectAll(); return; }
            if (e.target.contentEditable === "true") return;

            selectElement(el);
            dragEl = el;
            const rect = el.getBoundingClientRect();
            shiftX = e.clientX - rect.left;
            shiftY = e.clientY - rect.top;
            e.preventDefault();
        });

        window.addEventListener('mousemove', e => {
            if (!dragEl) return;
            const slide = dragEl.closest('.ppt-slide');
            const sRect = slide.getBoundingClientRect();
            let x = e.clientX - sRect.left - shiftX;
            let y = e.clientY - sRect.top - shiftY;
            
            x = Math.max(0, Math.min(x, 1100 - dragEl.offsetWidth));
            y = Math.max(0, Math.min(y, 618 - dragEl.offsetHeight));

            dragEl.style.left = x + 'px';
            dragEl.style.top = y + 'px';
        });

        window.addEventListener('mouseup', () => { dragEl = null; }, true);

        function exportDeck() {
            deselectAll();
            const html = document.documentElement.outerHTML;
            const b = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'Sjogrens_Syndrome_Master_Presentation.html';
            a.click();
        }

        init();
    </script>
</body>
</html>
